# ═══════════════════════════════════════════════════════════════
#  nginx — Heavy ERP
#  Serves React SPA + proxies /api/ to FastAPI backend
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;
    client_max_body_size 50M;
    charset utf-8;

    # ── Gzip compression ───────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/x-javascript text/xml application/xml
        image/svg+xml font/woff2;

    # ── API → FastAPI backend ──────────────────────────────────
    location /api/ {
        proxy_pass             http://backend:8000/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     60s;

        # CORS for local dev hitting nginx directly
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Swagger / ReDoc / OpenAPI ──────────────────────────────
    location ~ ^/(docs|redoc|openapi\.json) {
        proxy_pass        http://backend:8000;
        proxy_set_header  Host $host;
        proxy_connect_timeout 10s;
    }

    # ── Health check ───────────────────────────────────────────
    location /health {
        proxy_pass        http://backend:8000/health;
        proxy_set_header  Host $host;
        proxy_connect_timeout 5s;
    }

    # ── Uploads (user files) ───────────────────────────────────
    location /uploads/ {
        alias /uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Vite-built assets (fingerprinted filenames) ────────────
    # Long-lived cache because filenames contain content hash
    location /assets/ {
        root  /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── React SPA (catch-all) ──────────────────────────────────
    # Always serve index.html so React Router handles the path
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;

        # No cache for index.html (so new deploys are picked up instantly)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }
}
